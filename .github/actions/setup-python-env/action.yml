name: "Setup Python environment"
description: "Set up uv with Python and install project dependencies."

inputs:
  python-version:
    description: "Python version to install (e.g. '3.13', '3.10')."
    required: false
    default: "3.13"
  include-docs:
    description: "Install the docs dependency group (sphinx, sphinx_autodoc_typehints, …)."
    required: false
    default: "false"
  extra-args:
    description: "Additional arguments appended to the `uv sync` command. Only explicitly allowlisted flags are permitted (e.g. `--all-packages`, `--upgrade`, `-U`, `--prerelease=if-necessary-or-explicit`)."
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Set up uv
      uses: astral-sh/setup-uv@f0ec1fc3b38f5e7cd731bb6ce540c5af426746bb # v5.4.2
      with:
        python-version: ${{ inputs.python-version }}
        enable-cache: true

    - name: Install dependencies
      shell: bash
      env:
        EXTRA_ARGS: ${{ inputs.extra-args }}
        INCLUDE_DOCS: ${{ inputs.include-docs }}
      run: |
        args="--all-extras --dev"
        if [[ "$INCLUDE_DOCS" == "true" ]]; then
          args="$args --group docs"
        fi
        if [[ -n "$EXTRA_ARGS" ]]; then
          # Allowlist: only permit explicitly supported flags to prevent abuse.
          # To add a new flag, extend this list after reviewing its security implications.
          allowed_args=(
            "--all-packages"
            "--prerelease=if-necessary-or-explicit"
            "-U"
            "--upgrade"
          )
          for arg in $EXTRA_ARGS; do
            allowed=false
            for a in "${allowed_args[@]}"; do
              [[ "$arg" == "$a" ]] && allowed=true && break
            done
            if [[ "$allowed" != "true" ]]; then
              echo "::error::Unrecognized extra-args token: '$arg'. Only explicitly supported flags are permitted." >&2
              exit 1
            fi
          done
        fi
        # shellcheck disable=SC2086  # intentional word-splitting for uv flags (all tokens validated above)
        uv sync $args $EXTRA_ARGS
