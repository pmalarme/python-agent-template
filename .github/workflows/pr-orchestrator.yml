name: "PR: orchestrator"

on:
  pull_request:
    branches: ["main", "feature*", "fix*"]

permissions:
  contents: read
  actions: read
  pull-requests: read
  security-events: write

jobs:
  # ── Stage 1a: Code Quality ──────────────────────────────────────────
  code-quality:
    name: code quality
    uses: ./.github/workflows/python-code-quality.yml
    permissions:
      contents: read

  # ── Stage 1b: CodeQL (after code quality) ───────────────────────────
  codeql:
    name: codeql
    needs: code-quality
    uses: ./.github/workflows/codeql-analysis.yml
    permissions:
      actions: read
      contents: read
      security-events: write

  # ── Stage 2: Tests + Build Validation (parallel, after static analysis) ─
  tests:
    name: tests
    needs: codeql
    uses: ./.github/workflows/python-tests.yml
    permissions:
      contents: read

  package-build:
    name: package build
    needs: codeql
    uses: ./.github/workflows/python-package-build.yml
    permissions:
      contents: read

  docker-build:
    name: docker build
    needs: codeql
    uses: ./.github/workflows/python-docker-build.yml
    permissions:
      contents: read

  # ── Stage 3: Security Review (after tests + builds pass) ────────────
  security-review:
    name: security review
    needs: [tests, package-build, docker-build]
    uses: ./.github/workflows/security-review.lock.yml
    secrets: inherit
    permissions:
      contents: read
      pull-requests: write
