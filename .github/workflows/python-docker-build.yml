name: "Python: docker build & smoke test"

on:
  workflow_dispatch:
  pull_request:
    branches: ["main", "feature*", "fix*"]
    paths:
      - "agents/*/Dockerfile"
      - "agents/*/src/**"
      - "agents/*/pyproject.toml"

permissions:
  contents: read

jobs:
  detect:
    name: detect agents with Dockerfiles
    runs-on: ubuntu-latest

    outputs:
      agents: ${{ steps.find.outputs.agents }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Find changed agents with Dockerfiles
        id: find
        run: |
          # Get the base ref to diff against
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE="${{ github.event.pull_request.base.sha }}"
          else
            BASE="HEAD~1"
          fi

          # Find agents that have both a Dockerfile AND changed files
          changed_agents=$(git diff --name-only "$BASE" HEAD \
            | grep '^agents/' \
            | cut -d/ -f2 \
            | sort -u \
            | while read -r agent; do
                if [[ -f "agents/$agent/Dockerfile" ]]; then
                  echo "$agent"
                fi
              done \
            | jq -Rcn '[inputs]')
          echo "agents=$changed_agents" >> "$GITHUB_OUTPUT"

  build-and-test:
    name: build & smoke test ${{ matrix.agent }}
    needs: detect
    if: ${{ needs.detect.outputs.agents != '[]' }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        agent: ${{ fromJson(needs.detect.outputs.agents) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Build Docker image
        env:
          AGENT: ${{ matrix.agent }}
        run: |
          docker build \
            -t "${AGENT}:ci" \
            -f "agents/${AGENT}/Dockerfile" \
            "agents/${AGENT}"

      - name: Smoke test
        env:
          AGENT: ${{ matrix.agent }}
        run: docker run --rm "${AGENT}:ci" --help || true
