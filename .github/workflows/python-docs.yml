name: "Python: docs"

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - "docs/**"
      - "agents/*/docs/**"
      - "agents/*/src/**"
      - "scripts/generate_docs.py"
      - "pyproject.toml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: build docs
    runs-on: ubuntu-latest
    outputs:
      pages-enabled: ${{ steps.pages-check.outputs.enabled }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Python environment
        uses: ./.github/actions/setup-python-env
        with:
          include-docs: "true"
          extra-args: "--all-packages"

      - name: Build documentation
        run: uv run python scripts/generate_docs.py

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4.0.0
        with:
          path: docs/generated

      - name: Check GitHub Pages status
        id: pages-check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/pages")
          if [[ ! "${STATUS}" =~ ^[0-9]+$ ]]; then
            echo "::error::Invalid HTTP status code received from GitHub API: '${STATUS}'"
            exit 1
          fi
          if [ "${STATUS}" = "200" ]; then
            echo "enabled=true" >> "${GITHUB_OUTPUT}"
          else
            echo "enabled=false" >> "${GITHUB_OUTPUT}"
            echo "::notice::GitHub Pages is not configured for this repository. Skipping deployment."
          fi

  deploy:
    name: deploy to GitHub Pages
    needs: build
    if: needs.build.outputs.pages-enabled == 'true'
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
