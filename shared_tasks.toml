[tool.poe.tasks]
fmt = "ruff format"
format.ref = "fmt"

lint = "ruff check"
pyright = "pyright"

# Default tasks for type checking, security scanning, and testing
# Agents typically extend the root $POE_ROOT/pyproject.toml, and may override these
# tasks in their local pyproject.toml for custom configurations.
mypy = "uv run mypy --config-file $POE_ROOT/pyproject.toml src"
bandit = "uv run bandit -c pyproject.toml -r src docs/source"
test = "uv run pytest --cov-report=term-missing:skip-covered"

# publish builds and uploads the package to the configured index (e.g., GitHub Packages)
publish = "uv publish"

# repo/agent check bundle; when run with -C agents/<name>, scopes to that agent
check = ["fmt", "lint", "pyright", "mypy", "bandit", "test"]

clean-dist = "rm -rf dist"
build-package = "uv build"
build = ["build-package"]
